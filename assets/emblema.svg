<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300" role="img" aria-label="Bahía Secreta emblema">
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8C888"/><stop offset="0.5" stop-color="#C39A5B"/><stop offset="1" stop-color="#A9823F"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#brass)" stroke-width="8" stroke-linecap="round">
    <!-- arco izquierdo (abrazo) -->
    <path d="M126,84 C90,120 90,196 126,232"/>
    <!-- arco derecho (abrazo) -->
    <path d="M174,84 C210,120 210,196 174,232"/>
    <!-- horizonte marino -->
    <line x1="112" y1="172" x2="188" y2="172"/>
    <line x1="126" y1="188" x2="174" y2="188"/>
  </g>
  <!-- sol naciente sobre el horizonte -->
  <circle cx="150" cy="150" r="34" fill="url(#brass)"/>
</svg>
